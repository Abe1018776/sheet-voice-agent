<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Spreadsheet Voice Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a;
    --border: #2e3350; --accent: #4f7cff;
    --green: #22d3a0; --red: #ff5f5f; --yellow: #ffcc44;
    --text: #e2e8f0; --muted: #6b7280;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text); height: 100vh;
    display: grid; grid-template-columns: 1fr 300px;
    grid-template-rows: 52px 1fr; overflow: hidden;
  }
  header {
    grid-column: 1/-1; display: flex; align-items: center; gap: 10px;
    padding: 0 18px; background: var(--surface); border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 17px; font-weight: 700; }
  .logo span { color: var(--accent); }
  .pill {
    margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted);
    background: var(--surface2); border: 1px solid var(--border); border-radius: 99px; padding: 4px 10px;
  }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: background .3s; }
  .dot.ok  { background: var(--green); box-shadow: 0 0 5px var(--green); }
  .dot.err { background: var(--red); }

  .chat { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--border); }
  #msgs { flex: 1; overflow-y: auto; padding: 18px; display: flex; flex-direction: column; gap: 10px; scroll-behavior: smooth; }
  #msgs::-webkit-scrollbar { width: 4px; }
  #msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { max-width: 80%; padding: 9px 13px; border-radius: 12px; font-size: 14px; line-height: 1.5; animation: pop .15s ease; }
  @keyframes pop { from { opacity:0; transform:translateY(3px); } to { opacity:1; } }
  .msg.user   { background: #1e3a5f; align-self: flex-end; border-bottom-right-radius: 3px; }
  .msg.ai     { background: #1a2a1a; align-self: flex-start; border: 1px solid var(--border); border-bottom-left-radius: 3px; }
  .msg.system { background: transparent; align-self: center; color: var(--muted); font-size: 12px; font-style: italic; }
  .lbl { font-size: 10px; font-weight: 700; letter-spacing: .5px; margin-bottom: 3px; }
  .msg.user .lbl { color: var(--accent); text-align: right; }
  .msg.ai   .lbl { color: var(--green); }

  .bar {
    padding: 13px 18px; display: flex; align-items: center; gap: 12px;
    background: var(--surface); border-top: 1px solid var(--border);
  }
  #mic {
    width: 52px; height: 52px; border-radius: 50%; border: none; background: var(--accent);
    color: #fff; cursor: pointer; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; transition: transform .15s;
  }
  #mic:hover:not(:disabled) { transform: scale(1.06); }
  #mic:disabled { background: var(--muted); cursor: not-allowed; opacity: .5; }
  #mic.live { background: var(--red); animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(255,95,95,.4); }
    50%      { box-shadow: 0 0 0 14px rgba(255,95,95,0); }
  }
  #hint { font-size: 13px; color: var(--muted); }
  #hint strong { color: var(--text); display: block; margin-bottom: 2px; }

  .side { display: flex; flex-direction: column; min-height: 0; background: var(--surface); }
  .side-title {
    padding: 11px 14px; font-size: 10px; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  #acts { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 7px; }
  .act {
    background: var(--surface2); border: 1px solid rgba(34,211,160,.25);
    border-radius: 7px; padding: 8px 10px; font-size: 12px; animation: pop .15s;
  }
  .act-name { font-family: monospace; color: var(--yellow); font-weight: 600; margin-bottom: 4px; }
  .act-res  {
    background: var(--bg); border-radius: 4px; padding: 4px 7px;
    font-family: monospace; font-size: 11px; white-space: pre-wrap; word-break: break-all;
    max-height: 80px; overflow-y: auto;
  }
  .empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 13px; }
</style>
</head>
<body>

<header>
  <div class="logo">Sheet<span>Voice</span></div>
  <div class="pill"><div class="dot" id="dot"></div><span id="stxt">Connecting…</span></div>
</header>

<div class="chat">
  <div id="msgs"><div class="msg system">Connecting…</div></div>
  <div class="bar">
    <button id="mic" disabled>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
      </svg>
    </button>
    <div id="hint"><strong id="hstate">Not connected</strong><span id="hdesc">Waiting…</span></div>
  </div>
</div>

<aside class="side">
  <div class="side-title">Tool Activity</div>
  <div id="acts"><div class="empty">Sheet ops appear here</div></div>
</aside>

<script>
let ws, audioCtx, workletNode, micStream;
let micLive = false;
let nextPlay = 0;
let actsEmpty = true;

const dot    = document.getElementById('dot');
const stxt   = document.getElementById('stxt');
const msgs   = document.getElementById('msgs');
const mic    = document.getElementById('mic');
const hstate = document.getElementById('hstate');
const hdesc  = document.getElementById('hdesc');
const acts   = document.getElementById('acts');

function setStatus(cls, txt) { dot.className = 'dot' + (cls ? ' '+cls : ''); stxt.textContent = txt; }

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  if (role !== 'system') {
    const l = document.createElement('div'); l.className = 'lbl';
    l.textContent = role === 'user' ? 'YOU' : 'AI';
    d.appendChild(l);
  }
  const b = document.createElement('div'); b.textContent = text;
  d.appendChild(b); msgs.appendChild(d); msgs.scrollTop = msgs.scrollHeight;
  return b;
}

function appendToLastAI(delta) {
  const all = msgs.querySelectorAll('.msg.ai div:last-child');
  if (all.length) { all[all.length - 1].textContent += delta; }
  else addMsg('ai', delta);
  msgs.scrollTop = msgs.scrollHeight;
}

function addActivity(name, result) {
  if (actsEmpty) { acts.innerHTML = ''; actsEmpty = false; }
  const el = document.createElement('div');
  el.className = 'act';
  el.innerHTML = `<div class="act-name">${name}()</div><div class="act-res">${JSON.stringify(result, null, 2).replace(/</g,'&lt;')}</div>`;
  acts.insertBefore(el, acts.firstChild);
}

// ── Playback ──────────────────────────────────────────────────────────────────
function playB64PCM16(b64) {
  if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 24000 });
  const raw = atob(b64);
  const pcm = new Int16Array(raw.length / 2);
  for (let i = 0; i < pcm.length; i++)
    pcm[i] = raw.charCodeAt(i*2) | (raw.charCodeAt(i*2+1) << 8);
  const f32 = Float32Array.from(pcm, v => v / 32768);
  const buf = audioCtx.createBuffer(1, f32.length, 24000);
  buf.getChannelData(0).set(f32);
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.connect(audioCtx.destination);
  const now = audioCtx.currentTime;
  const start = Math.max(now + 0.01, nextPlay);
  src.start(start); nextPlay = start + buf.duration;
}

// ── Mic ───────────────────────────────────────────────────────────────────────
async function startMic() {
  if (!audioCtx) audioCtx = new AudioContext({ sampleRate: 48000 });
  if (audioCtx.state === 'suspended') await audioCtx.resume();
  micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const source = audioCtx.createMediaStreamSource(micStream);
  await audioCtx.audioWorklet.addModule('/audio-processor.js');
  workletNode = new AudioWorkletNode(audioCtx, 'pcm-processor');
  workletNode.port.onmessage = (e) => {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const bytes = new Uint8Array(e.data);
    let b = ''; for (let i = 0; i < bytes.length; i++) b += String.fromCharCode(bytes[i]);
    ws.send(JSON.stringify({ type: 'input_audio_buffer.append', audio: btoa(b) }));
  };
  source.connect(workletNode);
  workletNode.connect(audioCtx.destination);
}

function stopMic() {
  workletNode?.disconnect(); workletNode = null;
  micStream?.getTracks().forEach(t => t.stop()); micStream = null;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    setStatus('ok', 'Connected');
    mic.disabled = false;
    hstate.textContent = 'Ready';
    hdesc.textContent = 'Click mic and start talking';
    msgs.innerHTML = '';
    addMsg('system', 'Connected — click the mic and start talking');
  };

  ws.onclose = () => {
    setStatus('', 'Reconnecting…');
    mic.disabled = true; micLive = false; mic.classList.remove('live');
    stopMic();
    hstate.textContent = 'Disconnected';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => setStatus('err', 'Error');

  ws.onmessage = (e) => {
    let msg; try { msg = JSON.parse(e.data); } catch { return; }
    switch (msg.type) {
      case 'response.audio.delta':
        playB64PCM16(msg.delta);
        break;
      case 'response.audio_transcript.delta':
        appendToLastAI(msg.delta);
        break;
      case 'response.created':
        addMsg('ai', '');
        nextPlay = 0;
        break;
      case 'conversation.item.input_audio_transcription.completed':
        addMsg('user', msg.transcript);
        break;
      case 'input_audio_buffer.speech_started':
        // User started speaking — reset playback so AI doesn't talk over them
        nextPlay = 0;
        if (audioCtx) audioCtx.close().then(() => { audioCtx = null; });
        break;
      case 'tool_activity':
        addActivity(msg.name, msg.result);
        break;
      case 'error':
        addMsg('system', `Error: ${msg.error?.message ?? msg.message ?? 'Unknown error'}`);
        break;
    }
  };
}

// ── Mic button ────────────────────────────────────────────────────────────────
mic.addEventListener('click', async () => {
  if (!ws || mic.disabled) return;
  if (!micLive) {
    try {
      await startMic();
      micLive = true;
      mic.classList.add('live');
      hstate.textContent = 'Listening…';
      hdesc.textContent = 'Click to stop';
    } catch (err) {
      addMsg('system', 'Mic error: ' + err.message);
    }
  } else {
    stopMic();
    micLive = false;
    mic.classList.remove('live');
    hstate.textContent = 'Ready';
    hdesc.textContent = 'Click mic and start talking';
  }
});

connect();
</script>
</body>
</html>
